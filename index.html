<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
  touch-action: manipulation;
}

canvas {
  display: block;
  position: fixed;
  inset: 0;
  z-index: 1;
}

/* HOME SCREEN */
#home {
  position: fixed;
  inset: 0;
  background: linear-gradient(#4ec0ca, #ffffff);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#home button {
  width: 200px;
  padding: 12px;
  margin: 8px;
  font-size: 18px;
}

/* THEME MENU */
#themeMenu {
  display: none;
}

/* GAME UI */
#ui {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 10;
  display: none;
}

#retryBtn {
  position: fixed;
  left: 50%;
  top: 60%;
  transform: translate(-50%, -50%);
  padding: 14px 28px;
  font-size: 18px;
  z-index: 10;
  display: none;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>Flappy Bird</h1>
  <button onclick="startGame()">▶ Start Game</button>

  <button onclick="toggleThemeMenu()">🎨 Theme</button>
  <div id="themeMenu">
    <button onclick="selectTheme('city')">🏙 City</button>
    <button onclick="selectTheme('night')">🌙 Night</button>
    <button onclick="selectTheme('sunny')">☀ Sunny</button>
  </div>

  <button onclick="exitGame()">❌ Exit</button>
</div>

<!-- GAME UI -->
<div id="ui">
  <button onclick="goHome()">⬅ Menu</button>
</div>

<button id="retryBtn" onclick="retryGame()">🔁 Retry</button>

<canvas id="game"></canvas>

<script>
/* CANVAS */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GAME_WIDTH = 320;
const GAME_HEIGHT = 480;

let scale = 1, offsetX = 0, offsetY = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  scale = Math.max(canvas.width / GAME_WIDTH, canvas.height / GAME_HEIGHT);
  offsetX = (canvas.width - GAME_WIDTH * scale) / 2;
  offsetY = (canvas.height - GAME_HEIGHT * scale) / 2;
}
window.addEventListener("resize", resize);
resize();

/* IMAGES */
const bgImg = new Image();
const birdImg = new Image();
const pipeTopImg = new Image();
const pipeBottomImg = new Image();

pipeTopImg.src = "img/up.png";
pipeBottomImg.src = "img/down.png";

/* THEMES */
const themes = {
  city: {
    bg: "img/city.png",
    bird: "img/greenbird.png"
  },
  night: {
    bg: "img/night.png",
    bird: "iimg/bird1-removebg-preview.png"
  },
  sunny: {
    bg: "img/sunny.png",
    bird: "img/birdwhite-removebg-preview.png"
  }
};

function loadTheme(name) {
  bgImg.src = themes[name].bg;
  birdImg.src = themes[name].bird;
}

/* SOUND */
const flapSound = new Audio("audio/flap.mp3");
const hitSound = new Audio("audio/hit.mp3");
const scoreSound = new Audio("audio/score.wav");

/* GAME STATE */
let bird, pipes, frame, score;
let gameOver = false;
let playing = false;
let waiting = false;
let highScore = localStorage.getItem("highScore") || 0;

function resetGame() {
  bird = { x: 60, y: 200, w: 34, h: 24, v: 0 };
  pipes = [];
  frame = 0;
  score = 0;
  gameOver = false;
}

function addPipe() {
  pipes.push({ x: GAME_WIDTH, top: Math.random() * 180 + 40, passed: false });
}

function endGame() {
  if (gameOver) return;
  hitSound.play();
  gameOver = true;
  document.getElementById("retryBtn").style.display = "block";
  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
  }
}

function update() {
  if (!playing || gameOver || waiting) return;

  frame++;
  bird.v += 0.35;
  bird.y += bird.v;

  if (frame % 95 === 0) addPipe();

  pipes.forEach(p => {
    p.x -= 1.6;

    if (!p.passed && p.x + 52 < bird.x) {
      p.passed = true;
      score++;
      scoreSound.play();
    }

    if (
      bird.x + bird.w > p.x &&
      bird.x < p.x + 52 &&
      (bird.y < p.top || bird.y + bird.h > p.top + 180)
    ) endGame();
  });

  if (bird.y < 0 || bird.y + bird.h > GAME_HEIGHT) endGame();
}

function draw() {
  ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);
  ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  ctx.drawImage(bgImg, 0, 0, GAME_WIDTH, GAME_HEIGHT);
  ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

  pipes.forEach(p => {
    ctx.drawImage(pipeTopImg, p.x, p.top - 320, 52, 320);
    ctx.drawImage(pipeBottomImg, p.x, p.top + 180, 52, 320);
  });

  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 12, 90);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

/* CONTROLS */
function flap() {
  if (waiting) {
    waiting = false;
    playing = true;
    bird.v = -6;
    flapSound.play();
    return;
  }
  if (!playing || gameOver) return;
  bird.v = -6;
  flapSound.play();
}

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  flap();
});

document.addEventListener("keydown", e => {
  if (e.code === "Space") flap();
});

/* UI */
function startGame() {
  resetGame();
  waiting = true;
  document.getElementById("home").style.display = "none";
  document.getElementById("ui").style.display = "block";
}

function retryGame() {
  resetGame();
  waiting = true;
  document.getElementById("retryBtn").style.display = "none";
}

function goHome() {
  playing = false;
  waiting = false;
  document.getElementById("home").style.display = "flex";
  document.getElementById("ui").style.display = "none";
  document.getElementById("retryBtn").style.display = "none";
}

function toggleThemeMenu() {
  const m = document.getElementById("themeMenu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

function selectTheme(name) {
  loadTheme(name);
  document.getElementById("themeMenu").style.display = "none";
}

function exitGame() {
  alert("Thanks for playing!");
}

/* INIT */
loadTheme("city");
resetGame();
loop();
</script>

</body>
</html>
